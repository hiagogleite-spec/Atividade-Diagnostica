<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTATO</title>


</head>

<body>

    <form action="sucesso.html">
    
    <h1>Formulario para Contato </h1>
    <h4>Digite todas as informações</h4>

     <fieldset>   
<p>
    <label for="nome">Digite seu nome:</label>
    <input type="text" id="nome">
</p>

<p>
   <label for="email">Digite seu email:</label>
   <input type="email" id="email">
</p>

<p>
    <label for="assunto">Qual o assunto de interesse:</label>
    <input type="assunto text" id="assunto">
</p>

<p>
    <p><label for="mensagem">Qual Mensagem voce deseja nos passar:</label></p>
    <p> <textarea type="mensagem text" rows="4" cols="40" id="mensagem text"></textarea></p>
</p>

</fieldset>

<fieldset>

<p>
    <label for="telefone">Telefone:</label>
    <input type="tel" id="telefone" required>
</p>

<p>
   <label for="data">Data:</label>
   <input type="date" id="data" required>
</p>

<P>
<label>Motivo da Procura:</label>
<select>
    <option>Jovem Aprendiz</option>
    <option>Estagiario</option>
    <option>Auxiliar/Assistente</option>
</select>
</p>

    <input type="submit" value="Enviar">
    <input type="reset" value="Limpar">
</form>
 
</fieldset>
<a href="Index.html">Pagina inicial</a>
</body>
</html>
